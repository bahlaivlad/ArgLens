<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>apiguess</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <strong>apiguess</strong>
        <span>guess a WinAPI call from its arguments</span>
      </div>
      <div id="catalogMeta" class="catalog-meta"></div>
    </header>

    <main class="page">
      <section class="input-card">
        <div class="mode-tabs" role="tablist" aria-label="Input mode">
          <button id="manualTab" class="active" type="button" role="tab" aria-selected="true">Manual entry</button>
          <button id="pasteTab" type="button" role="tab" aria-selected="false">Paste disassembly</button>
        </div>

        <div id="manualPanel" class="mode-panel active" role="tabpanel" aria-labelledby="manualTab">
          <div class="section-kicker-row">
            <div class="section-kicker">Parameters</div>
            <div class="kicker-actions">
              <button id="clearArgs" class="icon-button" type="button" title="Clear all argument values" aria-label="Clear argument values">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M6 6 L18 18"></path>
                  <path d="M18 6 L6 18"></path>
                </svg>
                <span>Clear</span>
              </button>
              <button id="reverseArgs" class="icon-button" type="button" title="Reverse argument order" aria-label="Reverse argument order">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 18 V6"></path>
                  <path d="M4 10 L8 6 L12 10"></path>
                  <path d="M16 6 V18"></path>
                  <path d="M12 14 L16 18 L20 14"></path>
                </svg>
                <span>Reverse order</span>
              </button>
            </div>
          </div>
          <div class="count-block">
            <label for="paramCount">Argument count</label>
            <div class="count-controls" aria-label="Argument count presets">
              <button class="count-button" type="button" data-count="1">1</button>
              <button class="count-button" type="button" data-count="2">2</button>
              <button class="count-button" type="button" data-count="3">3</button>
              <button class="count-button" type="button" data-count="4">4</button>
              <button class="count-button" type="button" data-count="5">5</button>
              <button class="count-button" type="button" data-count="6">6</button>
              <span>7+</span>
              <input id="paramCount" type="number" min="0" max="12" placeholder="7" aria-label="Custom argument count (7 or more)">
            </div>
          </div>

          <div id="paramInputs" class="param-inputs"></div>
          <button id="matchBtn" class="primary-button" type="button">Match functions</button>
        </div>

        <div id="pastePanel" class="mode-panel" role="tabpanel" aria-labelledby="pasteTab" hidden>
          <div class="section-kicker">Disassembly</div>
          <p class="panel-copy">Paste x86 stack pushes or x64 register setup; arguments update automatically.</p>
          <div class="code-editor">
            <pre class="code-highlight" aria-hidden="true"><code id="codeHighlight"></code></pre>
            <textarea id="assemblyInput" spellcheck="false" rows="10" wrap="off" placeholder="Paste your disassembly here..." aria-label="Disassembly input"></textarea>
          </div>
          <div id="parsedArgs" class="parsed-args" hidden></div>
        </div>
      </section>

      <section class="results-column">
        <div class="results-topline">
          <div>
            <div class="section-kicker">Candidates</div>
          </div>
          <div id="resultMeta">0 ranked</div>
        </div>
        <div id="results" class="results-list" aria-live="polite"></div>
      </section>
    </main>

    <template id="paramTemplate">
      <div class="param-row">
        <label class="param-label"></label>
        <div class="param-edit">
          <input class="param-value" type="text" spellcheck="false" aria-label="Argument value">
          <button class="quick-value" type="button" data-value="0">0/NULL</button>
          <button class="quick-value" type="button" data-value="-1">-1</button>
          <button class="quick-value" type="button" data-value="unknown">?</button>
        </div>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
